name: Create Episode Production Checklist

on:
  workflow_dispatch:
    inputs:
      episode_number:
        description: 'Episode number (e.g. 52)'
        required: true
        type: string
      episode_title:
        description: 'Episode title'
        required: true
        type: string
      release_date:
        description: 'Release date (e.g. 2025-03-18)'
        required: true
        type: string
      guest_name:
        description: 'Guest name (optional)'
        required: false
        type: string

  # Uncomment to auto-trigger on a schedule instead:
  # schedule:
  #   - cron: '0 9 * * 1'  # Every Monday at 9 AM UTC

jobs:
  create-issue:
    runs-on: ubuntu-latest
    permissions:
      issues: write

    steps:
      - name: Set follow-up date
        id: dates
        run: |
          FOLLOWUP=$(date -d "${{ github.event.inputs.release_date }} + 2 days" +%Y-%m-%d 2>/dev/null || \
                     date -j -v+2d -f "%Y-%m-%d" "${{ github.event.inputs.release_date }}" +%Y-%m-%d)
          echo "followup=$FOLLOWUP" >> $GITHUB_OUTPUT

      - name: Create episode production issue
        id: create-issue
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const epNum    = '${{ github.event.inputs.episode_number }}';
            const epTitle  = '${{ github.event.inputs.episode_title }}';
            const guest    = '${{ github.event.inputs.guest_name }}';
            const release  = '${{ github.event.inputs.release_date }}';
            const followup = '${{ steps.dates.outputs.followup }}';
            const guestLine = guest ? `\n> 🎤 Guest: **${guest}**` : '';

            const body = `## 🎙️ Episode Production Checklist
            ${guestLine}
            > **Release date:** ${release} at 12 PM
            > **Follow-up date:** ${followup}
            >
            > Work through each phase in order. Check off items as you go.

            ---

            ### Phase 1 — Editing (Riverside)

            **1.1 AI Processing**
            - [ ] Open episode in Riverside
            - [ ] Confirm Magic Audio is applied (filler word & pause removal)
            - [ ] Review Find Fluff suggestions and accept/reject cuts
            - [ ] Verify final audio quality

            **1.2 Music**
            - [ ] Add 17-sec track at start → 2-sec fade-in, volume 45%
            - [ ] Add longer track at "thank you everybody for tuning in" → 2-sec fade-in, volume 45%
            - [ ] Listen through to confirm music feels right

            **1.3 Exports**
            - [ ] Download transcript
            - [ ] Download subtitles (SRT file)
            - [ ] Export full episode video

            ---

            ### Phase 2 — Clip Creation (Riverside)

            - [ ] Review AI-suggested clips (Magic Clips + Hooks section)
            - [ ] Select **Clip 1** — release day (YouTube Shorts, TikTok, LinkedIn, Bluesky)
            - [ ] Select **Clip 2** — follow-up, 1–2 days post-release
            - [ ] Export Clip 1 → \`Episode${epNum}_Clip1_ReleaseDay\`
            - [ ] Export Clip 2 → \`Episode${epNum}_Clip2_FollowUp\`

            ---

            ### Phase 3 — Content Generation (Claude)

            > Open the [Overcommitted Production Claude Project](https://claude.ai/projects) — context loads automatically.
            > Full prompt in [docs/episode-assets-prompt.md](../blob/main/docs/episode-assets-prompt.md).

            - [ ] Open the **Overcommitted Production** Claude Project
            - [ ] Upload full episode transcript
            - [ ] Upload Clip 1 and Clip 2 transcripts/SRT files
            - [ ] Type **"Episode Assets"** and send

            **Full Episode**
            - [ ] 3–5 title options
            - [ ] YouTube keywords (≤500 chars)
            - [ ] LinkedIn post copy
            - [ ] Bluesky post copy

            **Clip 1 (Release Day)**
            - [ ] YouTube Shorts copy (include "Episode just released today")
            - [ ] TikTok copy (release day language)
            - [ ] LinkedIn copy
            - [ ] Bluesky copy
            - [ ] YouTube keywords (≤500 chars)

            **Clip 2 (Follow-Up)**
            - [ ] YouTube Shorts copy (include "check out this week's episode")
            - [ ] TikTok copy
            - [ ] LinkedIn copy
            - [ ] Bluesky copy
            - [ ] YouTube keywords (≤500 chars)

            ---

            ### Phase 4 — Canva Assets

            **Thumbnail** — [Open Canva Thumbnail Project](https://www.canva.com/design/DAGyyqr-a7Q/SvIxo1BwFsgbl6lrLgrcBg/edit)
            - [ ] Add guest headshot
            - [ ] Add episode title text
            - [ ] Download as PNG → use for YouTube, LinkedIn, Bluesky, TikTok cover

            **Episode Artwork** — [Open Canva Episode Artwork Project](https://www.canva.com/design/DAG0HeJU-Ok/qguP2HipLKthx1qOsznkrQ/edit)
            - [ ] Add guest headshot
            - [ ] Add episode title text
            - [ ] Download as PNG → use for Spotify / podcast artwork in Riverside

            ---

            ### Phase 5 — Podcast Publishing (Riverside)

            - [ ] Upload episode artwork (from Canva)
            - [ ] Schedule full episode for **${release} at 12 PM**

            ---

            ### Phase 6 — YouTube Publishing

            **Full Episode**
            - [ ] Upload video to YouTube Studio
            - [ ] Add title (from Claude assets)
            - [ ] Add description
            - [ ] Add keywords
            - [ ] Upload SRT captions
            - [ ] Set thumbnail (from Canva)
            - [ ] Schedule for **${release} at 12 PM**

            **Clip 1 (YouTube Shorts)**
            - [ ] Upload clip with "Episode just released today" copy
            - [ ] Add keywords + subtitles
            - [ ] Select related video (previously published episode)
            - [ ] Schedule for **${release} at 12 PM**

            **Clip 2 (YouTube Shorts)**
            - [ ] Upload clip with "Check out this week's episode" copy
            - [ ] Add keywords + subtitles
            - [ ] Select related video
            - [ ] Schedule for **${followup}**

            ---

            ### Phase 7 — TikTok Publishing

            **Clip 1**
            - [ ] Upload + add post copy + hashtags
            - [ ] Confirm auto-captions generated
            - [ ] Schedule for **${release}**

            **Clip 2**
            - [ ] Upload + add post copy + hashtags
            - [ ] Confirm auto-captions generated
            - [ ] Schedule for **${followup}**

            - [ ] Copy TikTok auto-captions from both clips (for reuse in LinkedIn + Bluesky)

            ---

            ### Phase 8 — Social Media (LinkedIn + Bluesky)

            > 💡 Use Buffer to batch-schedule all posts in one session.

            **Full Episode — Release Day (${release})**
            - [ ] LinkedIn post
            - [ ] Bluesky post

            **Clip 1 — Release Day (${release})**
            - [ ] LinkedIn post + TikTok captions
            - [ ] Bluesky post + TikTok captions

            **Clip 2 — Follow-Up (${followup})**
            - [ ] LinkedIn post + TikTok captions
            - [ ] Bluesky post + TikTok captions

            ---

            ### 📅 Publishing Schedule

            | Content | Platform | Date |
            |---|---|---|
            | Full episode | Podcast + YouTube | ${release}, 12 PM |
            | Clip 1 | YouTube Shorts + TikTok + LinkedIn + Bluesky | ${release}, 12 PM |
            | Clip 2 | YouTube Shorts + TikTok + LinkedIn + Bluesky | ${followup} |

            ---

            ### ✅ Final Sign-Off

            - [ ] All scheduled content confirmed across platforms
            - [ ] File naming conventions followed for all exports
            - [ ] Claude-generated assets saved for episode record
            `;

            const issue = await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Episode Production Checklist — Ep. ${epNum}: ${epTitle}`,
              body: body,
              labels: ['production', 'checklist'],
            });

            console.log(`Created issue #${issue.data.number}: ${issue.data.html_url}`);
            core.setOutput('issue-number', issue.data.number);
            core.setOutput('issue-url', issue.data.html_url);
            return issue.data.number;

      - name: Add issue to Production Calendar project
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.PROJECT_TOKEN }}
          script: |
            const issueNumber = parseInt('${{ steps.create-issue.outputs.issue-number }}');

            // Get the issue node ID
            const issueData = await github.rest.issues.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
            });
            const issueNodeId = issueData.data.node_id;

            // Add to project #2 via GraphQL
            const projectQuery = await github.graphql(`
              query {
                organization(login: "overcommitted-dev") {
                  projectV2(number: 2) {
                    id
                  }
                }
              }
            `);
            const projectId = projectQuery.organization.projectV2.id;

            await github.graphql(`
              mutation {
                addProjectV2ItemById(input: {
                  projectId: "${projectId}"
                  contentId: "${issueNodeId}"
                }) {
                  item {
                    id
                  }
                }
              }
            `);

            console.log(`Added issue #${issueNumber} to Production Calendar project.`);
